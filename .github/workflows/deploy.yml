name: CI/CD Pipeline to AKS


on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-and-push:
    name: Build & Push to Docker Hub
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set short SHA
        run: echo "SHORT_SHA=$(echo $GITHUB_SHA | cut -c1-5)" >> $GITHUB_ENV

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: src/App
          file: src/App/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/k8s-demo-app:${{ env.SHORT_SHA }}
            ${{ secrets.DOCKER_USERNAME }}/k8s-demo-app:latest

  deploy-to-aks:
    name: Deploy to Azure AKS
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set AKS Context
        uses: azure/aks-set-context@v4
        with:
          resource-group: ${{ secrets.AZURE_RESOURCE_GROUP }}
          cluster-name: ${{ secrets.AZURE_CLUSTER_NAME }}

      - name: Set short SHA
        run: echo "SHORT_SHA=$(echo $GITHUB_SHA | cut -c1-5)" >> $GITHUB_ENV

      - name: Update manifest image tag
        run: |
          sed -i 's|image: .*k8s-demo-app:.*|image: ${{ secrets.DOCKER_USERNAME }}/k8s-demo-app:${{ env.SHORT_SHA }}|g' k8s/app/deployment.yaml

      - name: Create namespace, configmap and secret
        run: |
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/configmap.yaml
          kubectl apply -f k8s/secret.yaml

      - name: Deploy to Kubernetes
        run: |
          kubectl apply -f k8s/app/ 

      - name: Verify deployment
        run: |
          kubectl rollout status deployment/employee-app -n nagp-k8s-demo