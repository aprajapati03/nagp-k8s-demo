apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  namespace: nagp-k8s-demo
  name: app-hpa
  labels:
    app: employee-app
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: employee-app
  minReplicas: 4
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 50
